<!doctype html><html lang="uz"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Taklifnoma</title><style>html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#fff7fa}iframe{display:block;width:100%;height:100%;border:0}</style></head><body><iframe id="app" src="love-invite-mobile/index.html" title="Taklifnoma"></iframe><script>const f=document.getElementById('app');function b64(u){let s='';u.forEach(x=>s+=String.fromCharCode(x));return btoa(s).replaceAll('+','-').replaceAll('/','_').replaceAll('=','')}function ub64(s){s=s.replaceAll('-','+').replaceAll('_','/');s+='='.repeat((4-s.length%4)%4);let b=atob(s);return Uint8Array.from(b,x=>x.charCodeAt(0))}async function zip(o){let r=new TextEncoder().encode(JSON.stringify(o));if(!window.CompressionStream)return'g'+b64(r);let c=new CompressionStream('deflate-raw'),w=c.writable.getWriter();w.write(r);w.close();return'z'+b64(new Uint8Array(await new Response(c.readable).arrayBuffer()))}async function unzip(s){if(s[0]!=='z')return JSON.parse(new TextDecoder().decode(ub64(s.slice(1))));let d=new DecompressionStream('deflate-raw'),w=d.writable.getWriter();w.write(ub64(s.slice(1)));w.close();return JSON.parse(new TextDecoder().decode(new Uint8Array(await new Response(d.readable).arrayBuffer())))}function enc(o){return b64(new TextEncoder().encode(JSON.stringify(o)))}async function boot(){if(location.hash.startsWith('#i=')){let o=await unzip(location.hash.slice(3));f.src='love-invite-mobile/index.html#guest='+enc(o)}}boot();f.addEventListener('load',()=>{let d=f.contentDocument,w=f.contentWindow;if(!d)return;let create=d.querySelector('#create'),link=d.querySelector('#link'),send=d.querySelector('#send'),check=d.querySelector('#check'),yes=d.querySelector('#yes'),no=d.querySelector('#no'),ticket=d.querySelector('#ticketsec'),guest=d.querySelector('#guest');if(create)create.onclick=async()=>{let o=w.get(),e=w.valid(o);if(e)return w.toast(e);try{localStorage.setItem('loveInviteMobile',JSON.stringify(o))}catch{}link.value=location.href.split('#')[0]+'#i='+await zip(o);d.querySelector('#ready').classList.remove('hide');d.querySelector('#ready').scrollIntoView({behavior:'smooth'});w.toast('Qisqa link tayyor.')};if(send)send.onclick=()=>w.share('Test taklifnoma','Siz uchun taklifnoma tayyorlandi.',link.value);if(check)check.onclick=()=>window.open(link.value,'_blank');if(no){let run=e=>{e.preventDefault();let a=d.querySelector('#rsvpArena')||no.parentElement;no.style.position='absolute';no.style.left=(8+Math.random()*Math.max(8,a.clientWidth-no.offsetWidth-20))+'px';no.style.top=(65+Math.random()*55)+'px';w.toast('Faqat “Boraman” tanlanadi 😄')};no.addEventListener('pointerdown',run);no.addEventListener('pointerenter',run);no.onclick=e=>e.preventDefault()}if(yes)yes.onclick=()=>{ticket.classList.add('hide');let s=d.createElement('section');s.innerHTML='<div style="min-height:70vh;display:grid;place-items:center;text-align:center;padding:24px"><div style="background:#fff;border:1px solid #f0c9dc;border-radius:24px;padding:28px;box-shadow:0 16px 44px #6b173318"><h2 style="margin:0 0 12px;color:#8e1748;font:700 38px Georgia,serif">Uchrashuvingiz xayrli bo‘lsin!</h2><p style="color:#94677b;line-height:1.6">Javob qabul qilindi.</p></div></div>';guest.appendChild(s);w.scrollTo(0,0)}});</script></body></html>
