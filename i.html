<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Taklifnoma</title>
  <style>
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#fff7fa}
    iframe{display:block;width:100%;height:100%;border:0}
  </style>
</head>
<body>
  <iframe id="app" src="love-invite-mobile/index.html" title="Taklifnoma"></iframe>
  <script>
    const f=document.getElementById('app');

    function b64(u){
      let s='';
      u.forEach(x=>s+=String.fromCharCode(x));
      return btoa(s).replaceAll('+','-').replaceAll('/','_').replaceAll('=','');
    }

    function ub64(s){
      s=s.replaceAll('-','+').replaceAll('_','/');
      s+='='.repeat((4-s.length%4)%4);
      const b=atob(s);
      return Uint8Array.from(b,x=>x.charCodeAt(0));
    }

    async function zip(o){
      const raw=new TextEncoder().encode(JSON.stringify(o));
      if(!window.CompressionStream)return 'g'+b64(raw);
      const stream=new CompressionStream('deflate-raw');
      const writer=stream.writable.getWriter();
      writer.write(raw);
      writer.close();
      return 'z'+b64(new Uint8Array(await new Response(stream.readable).arrayBuffer()));
    }

    async function unzip(s){
      if(s[0]!=='z')return JSON.parse(new TextDecoder().decode(ub64(s.slice(1))));
      const stream=new DecompressionStream('deflate-raw');
      const writer=stream.writable.getWriter();
      writer.write(ub64(s.slice(1)));
      writer.close();
      return JSON.parse(new TextDecoder().decode(new Uint8Array(await new Response(stream.readable).arrayBuffer())));
    }

    function enc(o){
      return b64(new TextEncoder().encode(JSON.stringify(o)));
    }

    async function boot(){
      if(location.hash.startsWith('#i=')){
        const o=await unzip(location.hash.slice(3));
        f.src='love-invite-mobile/index.html#guest='+enc(o);
      }
    }

    boot();

    f.addEventListener('load',()=>{
      const d=f.contentDocument;
      const w=f.contentWindow;
      if(!d||!w)return;

      const originalToast=w.toast;
      if(typeof originalToast==='function'){
        w.toast=(message)=>{
          const wrongMessages=[
            'Bu javob qochib ketdi 😄',
            'Faqat “Boraman” tanlanadi 😄',
            'Faqat "Boraman" tanlanadi 😄'
          ];
          originalToast(wrongMessages.includes(message)?"To'g'ri javobni tanlang😄":message);
        };
      }

      const create=d.querySelector('#create');
      const link=d.querySelector('#link');
      const send=d.querySelector('#send');
      const check=d.querySelector('#check');
      const yes=d.querySelector('#yes');
      const no=d.querySelector('#no');
      const ticket=d.querySelector('#ticketsec');
      const guest=d.querySelector('#guest');

      if(create)create.onclick=async()=>{
        const o=w.get();
        const e=w.valid(o);
        if(e)return w.toast(e);
        try{localStorage.setItem('loveInviteMobile',JSON.stringify(o))}catch{}
        link.value=location.href.split('#')[0]+'#i='+await zip(o);
        d.querySelector('#ready').classList.remove('hide');
        d.querySelector('#ready').scrollIntoView({behavior:'smooth'});
        w.toast('Qisqa link tayyor.');
      };

      if(send)send.onclick=()=>w.share('Test taklifnoma','Siz uchun taklifnoma tayyorlandi.',link.value);
      if(check)check.onclick=()=>window.open(link.value,'_blank');

      if(no){
        const run=e=>{
          e.preventDefault();
          const arena=d.querySelector('#rsvpArena')||no.parentElement;
          no.style.position='absolute';
          no.style.left=(8+Math.random()*Math.max(8,arena.clientWidth-no.offsetWidth-20))+'px';
          no.style.top=(65+Math.random()*55)+'px';
          w.toast("To'g'ri javobni tanlang😄");
        };
        no.addEventListener('pointerdown',run);
        no.addEventListener('pointerenter',run);
        no.onclick=e=>e.preventDefault();
      }

      if(yes)yes.onclick=()=>{
        ticket.classList.add('hide');
        const section=d.createElement('section');
        section.innerHTML='<div style="min-height:70vh;display:grid;place-items:center;text-align:center;padding:24px"><div style="background:#fff;border:1px solid #f0c9dc;border-radius:24px;padding:28px;box-shadow:0 16px 44px #6b173318"><h2 style="margin:0 0 12px;color:#8e1748;font:700 38px Georgia,serif">Uchrashuvingiz xayrli bo‘lsin!</h2><p style="color:#94677b;line-height:1.6">Javob qabul qilindi.</p></div></div>';
        guest.appendChild(section);
        w.scrollTo(0,0);
      };
    });
  </script>
</body>
</html>
